<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Page Detection Test</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}
			body {
				font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
				background: #f5f5f5;
				padding: 20px;
			}
			.container {
				max-width: 900px;
				margin: 0 auto;
				background: white;
				border-radius: 8px;
				padding: 30px;
				box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
			}
			h1 {
				margin-bottom: 20px;
				color: #333;
			}
			button {
				padding: 10px 20px;
				background: #2563eb;
				color: white;
				border: none;
				border-radius: 4px;
				cursor: pointer;
				font-size: 14px;
				margin-bottom: 20px;
			}
			button:hover {
				background: #1d4ed8;
			}
			input[type="file"] {
				display: none;
			}
			.status {
				margin-bottom: 20px;
				padding: 10px;
				background: #f0f0f0;
				border-radius: 4px;
				font-size: 14px;
				font-family: monospace;
				white-space: pre-wrap;
			}
			canvas {
				max-width: 100%;
				height: auto;
				display: block;
				border: 1px solid #ddd;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<h1>📄 Page Detection Test</h1>
			<button onclick="document.getElementById('fileInput').click()">📁 Choose Image</button>
			<input type="file" id="fileInput" accept="image/*" />
			<div class="status" id="status">Pick an image of a document/page to test detection.</div>
			<canvas id="canvas"></canvas>
			<div style="display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap">
				<div>
					<h3 style="font-size: 12px; margin-bottom: 5px">Paper Mask</h3>
					<canvas id="paperMaskCanvas" style="max-width: 280px"></canvas>
				</div>
				<div>
					<h3 style="font-size: 12px; margin-bottom: 5px">Edges</h3>
					<canvas id="edgesCanvas" style="max-width: 280px"></canvas>
				</div>
				<div>
					<h3 style="font-size: 12px; margin-bottom: 5px">Combined</h3>
					<canvas id="combinedCanvas" style="max-width: 280px"></canvas>
				</div>
			</div>
		</div>

		<script type="module">
			import { detectPageCornersDebug } from "./PageDetection.js";

			const fileInput = document.getElementById("fileInput");
			const canvas = document.getElementById("canvas");
			const ctx = canvas.getContext("2d");
			const status = document.getElementById("status");

			function drawMask(canvasEl, mask, width, height) {
				canvasEl.width = width;
				canvasEl.height = height;
				const c = canvasEl.getContext("2d");
				const imgData = c.createImageData(width, height);
				for (let i = 0; i < mask.length; i++) {
					const v = mask[i];
					imgData.data[i * 4] = v;
					imgData.data[i * 4 + 1] = v;
					imgData.data[i * 4 + 2] = v;
					imgData.data[i * 4 + 3] = 255;
				}
				c.putImageData(imgData, 0, 0);
			}

			fileInput.addEventListener("change", (e) => {
				const file = e.target.files[0];
				if (!file) return;

				const img = new Image();
				img.onload = () => {
					canvas.width = img.width;
					canvas.height = img.height;
					ctx.drawImage(img, 0, 0);

					const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

					const t0 = performance.now();
					const { corners, hull, debug } = detectPageCornersDebug(imageData);
					const elapsed = (performance.now() - t0).toFixed(1);

					drawMask(document.getElementById("paperMaskCanvas"), debug.paperMask, debug.width, debug.height);
					drawMask(document.getElementById("edgesCanvas"), debug.edges, debug.width, debug.height);
					drawMask(document.getElementById("combinedCanvas"), debug.combined, debug.width, debug.height);

					// Draw hull points (small orange dots) for diagnostics
					if (hull) {
						ctx.fillStyle = "#ff8800";
						for (const p of hull) {
							ctx.beginPath();
							ctx.arc(p.x, p.y, Math.max(2, img.width / 200), 0, 2 * Math.PI);
							ctx.fill();
						}
					}

					if (!corners) {
						status.textContent = `No page detected. (${elapsed}ms)`;
						return;
					}

					const labels = ["TL", "TR", "BR", "BL"];
					let text = `Detected corners (${elapsed}ms):\n`;
					corners.forEach((c, i) => {
						text += `  ${labels[i]}: (${c.x.toFixed(1)}, ${c.y.toFixed(1)})\n`;
					});
					status.textContent = text;

					// Draw quad outline
					ctx.strokeStyle = "#00ff00";
					ctx.lineWidth = Math.max(2, img.width / 300);
					ctx.beginPath();
					ctx.moveTo(corners[0].x, corners[0].y);
					for (let i = 1; i < corners.length; i++) {
						ctx.lineTo(corners[i].x, corners[i].y);
					}
					ctx.closePath();
					ctx.stroke();

					// Draw corner markers
					const colors = ["#ff0000", "#0000ff", "#ffff00", "#ff00ff"]; // TL, TR, BR, BL
					const radius = Math.max(4, img.width / 100);
					corners.forEach((c, i) => {
						ctx.fillStyle = colors[i];
						ctx.beginPath();
						ctx.arc(c.x, c.y, radius, 0, 2 * Math.PI);
						ctx.fill();
					});
				};
				img.src = URL.createObjectURL(file);
			});
		</script>
	</body>
</html>
